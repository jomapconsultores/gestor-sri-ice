{% extends "base.html" %}
{% block title %}Agregar Licor{% endblock %}
{% block content %}
<h2 class="page-title mb-3">Agregar Licor</h2>
<div class="row">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-2"><input type="text" class="form-control form-control-sm" name="nombre" placeholder="Nombre del licor" required></div>
                    <div class="mb-2">
                        <select class="form-select form-select-sm" name="tipo">
                            <option value="Licor">Licor</option>
                            <option value="Cerveza Industrial">Cerveza Industrial</option>
                            <option value="Cerveza Artesanal">Cerveza Artesanal</option>
                            <option value="Cocktail">Cocktail</option>
                        </select>
                    </div>
                    <div class="row g-2 mb-2">
                        <div class="col-6"><input type="number" class="form-control form-control-sm" name="precio_fabrica" placeholder="Precio fábrica $" step="0.01" required></div>
                        <div class="col-6"><input type="number" class="form-control form-control-sm" name="volumen_cc" placeholder="Volumen cc" value="750"></div>
                    </div>
                    <div class="row g-2 mb-2">
                        <div class="col-6"><input type="number" class="form-control form-control-sm" name="grado_alcoholico" placeholder="Grado %" value="35" step="0.1"></div>
                        <div class="col-6"><input type="text" class="form-control form-control-sm" name="codigo_sri" placeholder="Código SRI"></div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm w-100">Guardar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
