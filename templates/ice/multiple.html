{% extends "base.html" %}

{% block title %}Calculadora Multiple{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-grid-3x3-gap"></i> Calculadora Multi-Producto</h2>

<div class="card shadow mb-4">
    <div class="card-header bg-success text-white">
        <h5 class="mb-0">Agregar Productos</h5>
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('ice.calcular_multiple') }}" id="formMultiple">
            
            <div id="productosContainer">
                <!-- Producto 1 -->
                <div class="producto-item border rounded p-3 mb-3 bg-light">
                    <div class="row">
                        <div class="col-md-3 mb-2">
                            <label class="form-label small">Nombre</label>
                            <input type="text" class="form-control form-control-sm" name="nombre_1" value="Producto 1">
                        </div>
                        <div class="col-md-2 mb-2">
                            <label class="form-label small">Precio ($)</label>
                            <input type="number" class="form-control form-control-sm" name="precio_1" value="4.50" step="0.01" required>
                        </div>
                        <div class="col-md-2 mb-2">
                            <label class="form-label small">Volumen (cc)</label>
                            <input type="number" class="form-control form-control-sm" name="volumen_1" value="750" required>
                        </div>
                        <div class="col-md-2 mb-2">
                            <label class="form-label small">Grado (%)</label>
                            <input type="number" class="form-control form-control-sm" name="grado_1" value="35" step="0.1" required>
                        </div>
                        <div class="col-md-1 mb-2">
                            <label class="form-label small">Cant.</label>
                            <input type="number" class="form-control form-control-sm" name="cantidad_1" value="1" required>
                        </div>
                        <div class="col-md-2 mb-2">
                            <label class="form-label small">Tipo</label>
                            <select class="form-select form-select-sm" name="tipo_1">
                                <option value="Licor">Licor</option>
                                <option value="Cerveza Industrial">Cerveza Ind.</option>
                                <option value="Cerveza Artesanal">Cerveza Art.</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            
            <button type="button" class="btn btn-outline-success btn-sm" onclick="agregarProducto()">
                <i class="bi bi-plus-circle"></i> Agregar Otro Producto
            </button>
            
            <hr>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Anios a Calcular</label>
                <div class="row">
                    {% for anio in tax_db.keys() %}
                    <div class="col-4 col-md-2">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="anios" value="{{ anio }}" id="m{{ anio }}" {{ 'checked' if anio == '2026' else '' }}>
                            <label class="form-check-label" for="m{{ anio }}">{{ anio }}</label>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
            
            <button type="submit" class="btn btn-success btn-lg w-100">
                <i class="bi bi-calculator-fill"></i> Calcular Todos
            </button>
        </form>
    </div>
</div>

<script>
let contador = 1;

function agregarProducto() {
    contador++;
    const container = document.getElementById('productosContainer');
    const div = document.createElement('div');
    div.className = 'producto-item border rounded p-3 mb-3 bg-light';
    div.innerHTML = `
        <div class="row">
            <div class="col-md-3 mb-2">
                <label class="form-label small">Nombre</label>
                <input type="text" class="form-control form-control-sm" name="nombre_${contador}" value="Producto ${contador}">
            </div>
            <div class="col-md-2 mb-2">
                <label class="form-label small">Precio ($)</label>
                <input type="number" class="form-control form-control-sm" name="precio_${contador}" value="4.50" step="0.01" required>
            </div>
            <div class="col-md-2 mb-2">
                <label class="form-label small">Volumen (cc)</label>
                <input type="number" class="form-control form-control-sm" name="volumen_${contador}" value="750" required>
            </div>
            <div class="col-md-2 mb-2">
                <label class="form-label small">Grado (%)</label>
                <input type="number" class="form-control form-control-sm" name="grado_${contador}" value="35" step="0.1" required>
            </div>
            <div class="col-md-1 mb-2">
                <label class="form-label small">Cant.</label>
                <input type="number" class="form-control form-control-sm" name="cantidad_${contador}" value="1" required>
            </div>
            <div class="col-md-2 mb-2">
                <label class="form-label small">Tipo</label>
                <select class="form-select form-select-sm" name="tipo_${contador}">
                    <option value="Licor">Licor</option>
                    <option value="Cerveza Industrial">Cerveza Ind.</option>
                    <option value="Cerveza Artesanal">Cerveza Art.</option>
                </select>
            </div>
        </div>
    `;
    container.appendChild(div);
}
</script>
{% endblock %}
