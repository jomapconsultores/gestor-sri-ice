{% extends "base.html" %}
{% block title %}Auditoría Excel{% endblock %}
{% block content %}
<h2 class="page-title mb-3"><i class="bi bi-file-earmark-excel me-2"></i>Auditoría ICE Excel</h2>
<div class="row">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">Datos del Producto</div>
            <div class="card-body">
                <form method="POST">
                    <div class="row g-2">
                        <div class="col-6"><input type="number" class="form-control form-control-sm" name="precio" value="4.50" step="0.01" placeholder="Precio $"></div>
                        <div class="col-6"><input type="number" class="form-control form-control-sm" name="volumen" value="750" placeholder="Vol. cc"></div>
                        <div class="col-6"><input type="number" class="form-control form-control-sm" name="grado" value="35" step="0.1" placeholder="Grado %"></div>
                        <div class="col-6"><input type="number" class="form-control form-control-sm" name="cantidad" value="1" placeholder="Cant."></div>
                    </div>
                    <select class="form-select form-select-sm mt-2" name="tipo">
                        <option value="Licor">Licor</option>
                        <option value="Cerveza Industrial">Cerveza Ind.</option>
                        <option value="Cerveza Artesanal">Cerveza Art.</option>
                    </select>
                    <div class="mt-2"><label class="small fw-bold">Años:</label>
                        <div class="d-flex flex-wrap gap-1">
                            {% for anio in tax_db.keys() %}
                            <label class="small"><input type="checkbox" name="anios" value="{{ anio }}" {{ 'checked' if anio=='2026' }}> {{ anio }}</label>
                            {% endfor %}
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success btn-sm w-100 mt-3">Descargar Excel</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
