{% extends "base.html" %}

{% block title %}Historial de Anexos{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-clock-history"></i> Historial de Anexos</h2>

<div class="card shadow">
    <div class="card-body text-center py-5">
        <i class="bi bi-file-earmark-xml text-muted" style="font-size: 4rem;"></i>
        <h4 class="text-muted mt-3">Anexos Generados</h4>
        <p>Los anexos que generes se descargaran automaticamente.</p>
        <a href="{{ url_for('annexes.pagina_generar') }}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Generar Nuevo Anexo
        </a>
    </div>
</div>
{% endblock %}
