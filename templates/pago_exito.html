{% extends "base.html" %}

{% block title %}¡Pago Exitoso!{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card shadow">
            <div class="card-body p-5">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
                <h2 class="mt-3">¡Pago Exitoso!</h2>
                <p class="text-muted">Tu suscripción ha sido activada correctamente.</p>
                <p>Plan: <strong>{{ plan }}</strong></p>
                <p class="text-muted small">Serás redirigido en unos segundos...</p>
                <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg mt-3">
                    Ir al Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
